<ng-container *transloco="let t">
  <section class="space-y-3">
    <div>
      <textarea pTextarea id="batch" [formControl]="batchInput" rows="6" fluid
        [placeholder]="t('modals.provider.one_entry_per_line')"></textarea>
    </div>

    <div class="flex items-center gap-2 text-xs text-primary-500 dark:text-primary-400">
      <i class="pi pi-info-circle"></i>
      <span>{{ t('modals.provider.enter_one_entry_per_line') }}</span>
    </div>

    <div class="mt-4 text-right">
      <p-button (click)="closeDialog()" text [disabled]="!batchInput.value" [label]="t('common.actions.confirm')" />
    </div>
  </section>
</ng-container>
