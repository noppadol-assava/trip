<ng-container *transloco="let t">
  <div>
    @if (isEditing) {
    <textarea pTextarea id="notes" [placeholder]="t('common.fields.notes')" [formControl]="notes" rows="4" autoResize
      fluid></textarea>
    } @else {
    @if (notes.value) {
    <div class="mt-4 border-l-3 border-primary-900 pl-6 py-2">
      <span class="leading-relaxed text-primary-800 dark:text-primary-200 whitespace-pre-wrap"
        [innerHTML]="notes.value | linkify"></span>
    </div>
    } @else {
    <div class="text-center">
      <p class="mt-2 text-primary-500 dark:text-primary-400">{{ t('modals.notes.empty') }}</p>
    </div>
    }
    }
  </div>

  <div class="mt-4 flex justify-between">
    @if (isEditing) {
    <p-button text [label]="t('common.actions.cancel')" icon="pi pi-times" severity="danger"
      (click)="cancelEditing()" />
    <p-button (click)="closeDialog()" [disabled]="notes.pristine" [label]="t('common.actions.confirm')" />
    } @else {
    <div></div>
    <p-button text [label]="t('common.actions.edit')" [disabled]="isArchived" icon="pi pi-pencil"
      (click)="toggleEditing()" />
    }
  </div>
</ng-container>
